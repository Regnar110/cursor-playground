# Load balancer przed instancjami tmeNext (docker-compose).
# Wejscie: http://localhost:8080 -> round-robin po 8 instancjach.

upstream tme_next {
    # least_conn lepiej rozklada nierowne czasy renderu niz czysty round-robin
    least_conn;
    server tme-next-1:3000;
    server tme-next-2:3000;
    server tme-next-3:3000;
    server tme-next-4:3000;
    server tme-next-5:3000;
    server tme-next-6:3000;
    server tme-next-7:3000;
    server tme-next-8:3000;
    keepalive 32;
}

server {
    listen 80;

    # Ktora instancja obsluzyla request - widoczne w devtools (debug)
    add_header X-Upstream $upstream_addr always;

    location / {
        proxy_pass http://tme_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # instancja padla -> sprobuj nastepnej zamiast zwracac blad
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }
}
